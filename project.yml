name: ScrollCap
options:
  bundleIdPrefix: com.ethanshen.scrollcap
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  developmentLanguage: en
  knownRegions:
    - en
    - zh-Hans
    - Base

packages:
  SharedModels:
    path: Packages/SharedModels
  DesignSystem:
    path: Packages/DesignSystem
  StitchingEngine:
    path: Packages/StitchingEngine
  CaptureKit:
    path: Packages/CaptureKit
  ImageEditor:
    path: Packages/ImageEditor

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_COMPILATION_MODE: "singlefile"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: "wholemodule"
      DEAD_CODE_STRIPPING: YES
      STRIP_SWIFT_SYMBOLS: YES
      LLVM_LTO: "YES_THIN"
      GCC_OPTIMIZATION_LEVEL: "s"
      SWIFT_ENFORCE_EXCLUSIVE_ACCESS: "compile-time"
      COPY_PHASE_STRIP: YES
      STRIP_INSTALLED_PRODUCT: YES
      ENABLE_NS_ASSERTIONS: NO

targets:
  ScrollCap-iOS:
    type: application
    platform: iOS
    sources:
      - path: App/Shared
        excludes:
          - "**/.DS_Store"
      - path: App/iOS
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethanshen.scrollcap
        INFOPLIST_FILE: App/iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/iOS/ScrollCapiOS.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: SharedModels
      - package: DesignSystem
      - package: StitchingEngine
      - package: CaptureKit
        product: CaptureKit
      - package: CaptureKit
        product: CaptureKitIOS
      - package: ImageEditor
      - target: BroadcastExtension
      - target: ScrollCapWidget
    entitlements:
      path: App/iOS/ScrollCapiOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.scrollcap.shared
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.ethanshen.scrollcap
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.ethanshen.scrollcap

  ScrollCap-macOS:
    type: application
    platform: macOS
    sources:
      - path: App/Shared
        excludes:
          - "**/.DS_Store"
      - path: App/macOS
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethanshen.scrollcap
        INFOPLIST_FILE: App/macOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/macOS/ScrollCap.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: SharedModels
      - package: DesignSystem
      - package: StitchingEngine
      - package: CaptureKit
        product: CaptureKit
      - package: CaptureKit
        product: CaptureKitMac
      - package: ImageEditor
    entitlements:
      path: App/macOS/ScrollCap.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.assets.pictures.read-write: true
        com.apple.security.network.client: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.ethanshen.scrollcap
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.ethanshen.scrollcap

  BroadcastExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: BroadcastExtension
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethanshen.scrollcap.BroadcastExtension
        INFOPLIST_FILE: BroadcastExtension/Info.plist
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: SharedModels
    entitlements:
      path: App/iOS/ScrollCapiOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.scrollcap.shared

  ScrollCapWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: ScrollCapWidget
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethanshen.scrollcap.widget
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: ScrollCapWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - package: SharedModels
    entitlements:
      path: App/iOS/ScrollCapiOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.scrollcap.shared

schemes:
  ScrollCap-iOS:
    build:
      targets:
        ScrollCap-iOS: all
        BroadcastExtension: all
        ScrollCapWidget: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release

  ScrollCap-macOS:
    build:
      targets:
        ScrollCap-macOS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
