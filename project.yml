name: ScrollCap
options:
  bundleIdPrefix: com.ethanshen.scrollcap
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  SharedModels:
    path: Packages/SharedModels
  DesignSystem:
    path: Packages/DesignSystem
  StitchingEngine:
    path: Packages/StitchingEngine
  CaptureKit:
    path: Packages/CaptureKit
  ImageEditor:
    path: Packages/ImageEditor

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  ScrollCap-iOS:
    type: application
    platform: iOS
    sources:
      - path: App/Shared
        excludes:
          - "**/.DS_Store"
      - path: App/iOS
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethanshen.scrollcap
        INFOPLIST_FILE: App/iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/iOS/ScrollCapiOS.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: SharedModels
      - package: DesignSystem
      - package: StitchingEngine
      - package: CaptureKit
        product: CaptureKit
      - package: CaptureKit
        product: CaptureKitIOS
      - package: ImageEditor
      - target: BroadcastExtension
    entitlements:
      path: App/iOS/ScrollCapiOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.scrollcap.shared

  ScrollCap-macOS:
    type: application
    platform: macOS
    sources:
      - path: App/Shared
        excludes:
          - "**/.DS_Store"
      - path: App/macOS
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethanshen.scrollcap
        INFOPLIST_FILE: App/macOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/macOS/ScrollCap.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: SharedModels
      - package: DesignSystem
      - package: StitchingEngine
      - package: CaptureKit
        product: CaptureKit
      - package: CaptureKit
        product: CaptureKitMac
      - package: ImageEditor
    entitlements:
      path: App/macOS/ScrollCap.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.assets.pictures.read-write: true

  BroadcastExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: BroadcastExtension
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethanshen.scrollcap.BroadcastExtension
        INFOPLIST_FILE: BroadcastExtension/Info.plist
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      path: App/iOS/ScrollCapiOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.scrollcap.shared

schemes:
  ScrollCap-iOS:
    build:
      targets:
        ScrollCap-iOS: all
        BroadcastExtension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release

  ScrollCap-macOS:
    build:
      targets:
        ScrollCap-macOS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
