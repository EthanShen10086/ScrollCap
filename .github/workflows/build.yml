name: Build & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-packages:
    name: Build Swift Packages
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Resolve Package Dependencies
        run: |
          for pkg in SharedModels DesignSystem StitchingEngine CaptureKit ImageEditor; do
            echo "::group::Build $pkg"
            cd Packages/$pkg && swift build && cd ../..
            echo "::endgroup::"
          done

  test-packages:
    name: Test Swift Packages
    runs-on: macos-15
    needs: build-packages
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Test SharedModels
        run: cd Packages/SharedModels && swift test

      - name: Test StitchingEngine
        run: cd Packages/StitchingEngine && swift test

      - name: Test ImageEditor
        run: cd Packages/ImageEditor && swift test

  build-xcode:
    name: Build ${{ matrix.scheme }} (${{ matrix.platform }})
    runs-on: macos-15
    needs: build-packages
    strategy:
      matrix:
        include:
          - scheme: ScrollCap-macOS
            platform: macOS
            destination: "platform=macOS"
          - scheme: ScrollCap-iOS
            platform: iOS Simulator
            destination: "platform=iOS Simulator,name=iPhone 16 Pro"
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build ${{ matrix.scheme }}
        run: |
          xcodebuild build \
            -project ScrollCap.xcodeproj \
            -scheme ${{ matrix.scheme }} \
            -destination "${{ matrix.destination }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            2>&1 | xcpretty || true

      - name: Build Result
        if: always()
        run: echo "Build for ${{ matrix.scheme }} completed"
